name: Daily AI Briefing

on:
  schedule:
    # Run every day at 7:00 AM UTC
    - cron: "0 7 * * *"
  push:
    branches: [main]
    paths: ["ai-radar/**"]
  pull_request:
    branches: [main]
    paths: ["ai-radar/**"]
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-radar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-radar/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests
        run: pytest

  generate-briefing:
    needs: test
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-radar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: ai-radar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          DASHBOARD_URL: https://c0de-mule.github.io/ai-radar/
        run: python -m pipeline.main

      - name: Commit and push briefing data
        run: |
          cd ..
          git config user.name "AI Radar Bot"
          git config user.email "actions@github.com"
          git add ai-radar/data/
          git diff --cached --quiet || git commit -m "📡 Daily briefing — $(date -u +%Y-%m-%d)"
          git push
